# Jekyll Theme: Chirpy (gem-based)
theme: jekyll-theme-chirpy

# Avatar & Theme Mode
# Avatar: GitHub avatar URL from API
# This uses the official GitHub avatar CDN for reliable image delivery
avatar: "https://avatars.githubusercontent.com/u/834354?v=4"

# Theme mode (Chirpy):
#   leave empty  -> follow OS prefers-color-scheme AND show a user toggle button
#   light        -> force light, no toggle
#   dark         -> force dark, no toggle
theme_mode:

# Site title & metadata
title: Continuous Improvement for Software Engineers
tagline: Instructions, notes and guides to help with continuous software improvement.
description: A professional documentation site for software engineering best practices, DevOps, and continuous improvement methodologies.
url: "https://jamie-clayton.github.io"
baseurl: "/Docs"

# Site language and timezone
lang: en
timezone: Australia/Sydney

# Author information
author:
  name: Jamie Clayton
  email: jamie.clayton@jenasysdesign.com.au
  github: jamie-clayton

# Navigation & sidebar
show_downloads: false

# Exclude from Jekyll processing
exclude:
  - docs/superpowers/
  - docs/templates/
  - scripts/
  - .gitignore
  - Gemfile
  - Gemfile.lock

# Include additional files
include:
  - .htaccess

# Pagination
paginate: 10

# Permalinks: route posts under /posts/ to match Chirpy conventions
permalink: /posts/:year/:month/:day/:title/

# Markdown / syntax highlighting (Chirpy requirement)
# Jekyll does NOT inherit a theme gem's _config.yml, so Chirpy's Rouge settings
# must live here. block.line_numbers must be true: it makes Rouge emit the
# line-number <table> whose inner <pre> carries `white-space: pre`. Without it,
# Chirpy's refactor-content.html strips the <pre> from highlighted blocks and
# nothing preserves newlines, so code renders as one collapsed paragraph.
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Plugins (managed by github-pages gem)
plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-feed

# Collections configuration for Chirpy tabs
collections:
  tabs:
    output: true
    sort_by: order

# Default settings for specific types
defaults:
  # Default settings for posts — applies Chirpy's post layout to everything in _posts/
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  # Default settings for tabs
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# HTML compression — required by Chirpy to preserve <pre>/<code> whitespace
# while still trimming layout boilerplate. Without this block, the gem's
# compress.html layout uses defaults that collapse newlines inside code blocks.
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# Archive configuration for categories and tags
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
