# Jekyll Theme: Chirpy
theme: jekyll-theme-chirpy

# Avatar & Theme Mode
# Avatar: leave empty for no avatar, or provide a URL/path to an image
# For GitHub avatar, use: https://github.com/{username}.png
avatar: ""

# Theme mode: leave empty to follow system preference (with toggle),
# or set to 'light' or 'dark' for a fixed theme
theme_mode: # [light | dark]

# Site title & metadata
title: Continuous Improvement for Software Engineers
tagline: Instructions, notes and guides to help with continuous software improvement.
description: A professional documentation site for software engineering best practices, DevOps, and continuous improvement methodologies.
url: "https://jamie-clayton.github.io/Docs"

# Site language and timezone
lang: en
timezone: Australia/Sydney

# Author information
author:
  name: Jamie Clayton
  email: jamie.clayton@jenasysdesign.com.au
  github: jamie-clayton

# Navigation & sidebar
show_downloads: false

# SEO & Social Media
social:
  links:
    - https://github.com/jamie-clayton

# Exclude from Jekyll processing
exclude:
  - docs/superpowers/
  - .gitignore
  - Gemfile
  - Gemfile.lock

# Include additional files
include:
  - .htaccess

# Pagination
paginate: 10

# Permalinks: route posts under /posts/ to match Chirpy conventions
permalink: /posts/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-feed
